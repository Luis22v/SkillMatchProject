<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruebas - SkillMatch</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; background: #003d82; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #1ba3a3; }
        pre { background: #222; color: #0f0; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 Panel de Pruebas - SkillMatch</h1>
    
    <div class="section">
        <h2>1. Estado del Backend</h2>
        <button onclick="testBackend()">Verificar Backend</button>
        <div id="backend-status"></div>
    </div>

    <div class="section">
        <h2>2. Autenticación</h2>
        <button onclick="testRegister()">Registrar Usuario</button>
        <button onclick="testLogin()">Login</button>
        <div id="auth-status"></div>
    </div>

    <div class="section">
        <h2>3. Trabajos (Jobs)</h2>
        <button onclick="testJobs()">Listar Trabajos</button>
        <div id="jobs-status"></div>
    </div>

    <div class="section">
        <h2>4. SavedJobs</h2>
        <button onclick="testSavedJobs()">Guardar Trabajo</button>
        <button onclick="testListSaved()">Ver Guardados</button>
        <div id="savedjobs-status"></div>
    </div>

    <div class="section">
        <h2>5. Conexiones</h2>
        <button onclick="testConnections()">Ver Sugerencias</button>
        <button onclick="testMyConnections()">Mis Conexiones</button>
        <div id="connections-status"></div>
    </div>

    <div class="section">
        <h2>6. Mensajes</h2>
        <button onclick="testMessages()">Ver Conversaciones</button>
        <div id="messages-status"></div>
    </div>

    <div class="section">
        <h2>7. Notificaciones</h2>
        <button onclick="testNotifications()">Ver Notificaciones</button>
        <div id="notifications-status"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        let token = localStorage.getItem('token') || '';

        function display(elementId, html, isError = false) {
            document.getElementById(elementId).innerHTML = 
                `<div class="${isError ? 'error' : 'success'}">${html}</div>`;
        }

        async function testBackend() {
            try {
                const response = await fetch(`${API_BASE_URL}/jobs`);
                const jobs = await response.json();
                display('backend-status', `✅ Backend activo<br>Trabajos disponibles: ${jobs.length}`);
            } catch (error) {
                display('backend-status', `❌ Backend NO responde: ${error.message}`, true);
            }
        }

        async function testRegister() {
            try {
                const randomId = Math.floor(Math.random() * 10000);
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        firstName: 'Test',
                        lastName: 'User',
                        email: `test${randomId}@test.com`,
                        password: 'password123',
                        role: 'USUARIO'
                    })
                });
                const data = await response.json();
                token = data.token;
                localStorage.setItem('token', token);
                display('auth-status', `✅ Usuario registrado<br>Token guardado`);
            } catch (error) {
                display('auth-status', `❌ Error en registro: ${error.message}`, true);
            }
        }

        async function testLogin() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: 'usuario0@skillmatch.com',
                        password: 'password123'
                    })
                });
                const data = await response.json();
                token = data.token;
                localStorage.setItem('token', token);
                display('auth-status', `✅ Login exitoso<br>Token guardado`);
            } catch (error) {
                display('auth-status', `❌ Error en login: ${error.message}`, true);
            }
        }

        async function testJobs() {
            try {
                const response = await fetch(`${API_BASE_URL}/jobs`);
                const jobs = await response.json();
                display('jobs-status', 
                    `✅ ${jobs.length} trabajos cargados<br>` +
                    `Ejemplo: ${jobs[0].title} en ${jobs[0].companyName}`
                );
            } catch (error) {
                display('jobs-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testSavedJobs() {
            if (!token) {
                display('savedjobs-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/saved-jobs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ jobId: 1 })
                });
                const data = await response.json();
                display('savedjobs-status', `✅ Trabajo guardado (ID: ${data.id})`);
            } catch (error) {
                display('savedjobs-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testListSaved() {
            if (!token) {
                display('savedjobs-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/saved-jobs/my-saved-jobs`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const saved = await response.json();
                display('savedjobs-status', 
                    `✅ ${saved.length} trabajos guardados<br>` +
                    (saved.length > 0 ? `Primero: ${saved[0].jobTitle}` : '')
                );
            } catch (error) {
                display('savedjobs-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testConnections() {
            if (!token) {
                display('connections-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/connections/suggestions`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const suggestions = await response.json();
                display('connections-status', `✅ ${suggestions.length} sugerencias encontradas`);
            } catch (error) {
                display('connections-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testMyConnections() {
            if (!token) {
                display('connections-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/connections/my-connections`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const connections = await response.json();
                display('connections-status', `✅ ${connections.length} conexiones activas`);
            } catch (error) {
                display('connections-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testMessages() {
            if (!token) {
                display('messages-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/messages/conversations`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const conversations = await response.json();
                display('messages-status', `✅ ${conversations.length} conversaciones`);
            } catch (error) {
                display('messages-status', `❌ Error: ${error.message}`, true);
            }
        }

        async function testNotifications() {
            if (!token) {
                display('notifications-status', '❌ Debes hacer login primero', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/notifications`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const notifications = await response.json();
                display('notifications-status', `✅ ${notifications.length} notificaciones`);
            } catch (error) {
                display('notifications-status', `❌ Error: ${error.message}`, true);
            }
        }

        // Auto-test al cargar
        window.onload = () => {
            testBackend();
            if (token) {
                display('auth-status', '✅ Token encontrado en localStorage');
            }
        };
    </script>
</body>
</html>
