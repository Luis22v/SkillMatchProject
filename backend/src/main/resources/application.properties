# Servidor
server.port=${PORT:8080}
spring.profiles.active=prod

# MongoDB - Railway inyecta MONGODB_URL automáticamente
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/skillmatch}
spring.data.mongodb.database=skillmatch

# JWT
jwt.secret=${JWT_SECRET:skillmatch-dev-secret-key-for-local-development-only}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# SpringDoc
springdoc.override-with-generic-response=false

# Logging producción
logging.level.com.skillmatch.backend=INFO
logging.level.org.springframework.security=WARN