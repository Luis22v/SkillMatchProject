# Servidor
server.port=8080
spring.profiles.active=dev

# ─── MongoDB ──────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/skillmatch
spring.data.mongodb.database=skillmatch

# ─── JWT ──────────────────────────────────────────────────
# IMPORTANTE: en producción setear JWT_SECRET como variable de entorno.
# Mínimo 64 caracteres para cumplir OWASP A02 con HS256.
# Ejemplo: export JWT_SECRET=$(openssl rand -hex 64)
jwt.secret=${JWT_SECRET:skillmatch-dev-secret-key-for-local-development-only-do-not-use-in-production-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Encoding ─────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ─── Logging ──────────────────────────────────────────────
logging.level.com.skillmatch.backend=DEBUG
logging.level.org.springframework.security=WARN
