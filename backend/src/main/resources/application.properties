# Servidor
server.port=8080
spring.profiles.active=dev

# ─── MySQL ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/skillmatch?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── JWT ──────────────────────────────────────────────────
# IMPORTANTE: en producción setear JWT_SECRET como variable de entorno.
# Mínimo 64 caracteres para cumplir OWASP A02 con HS256.
# Ejemplo: export JWT_SECRET=$(openssl rand -hex 64)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Encoding ─────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ─── Logging ──────────────────────────────────────────────
logging.level.com.skillmatch.backend=DEBUG
logging.level.org.springframework.security=WARN