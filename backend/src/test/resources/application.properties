# ─── MongoDB para tests ────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/skillmatch-test
spring.data.mongodb.database=skillmatch-test

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=skillmatch-dev-secret-key-for-local-development-only-do-not-use-in-production-2024
jwt.expiration=86400000

# No sembrar datos de prueba
skillmatch.seed.enabled=false

# ─── Logging silencioso en tests ──────────────────────────
logging.level.com.skillmatch.backend=WARN
logging.level.org.springframework.security=WARN
