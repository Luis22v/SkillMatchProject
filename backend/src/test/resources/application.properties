# ─── H2 in-memory DB para tests ───────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Crear y destruir esquema en cada ejecución de tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=skillmatch-dev-secret-key-for-local-development-only-do-not-use-in-production-2024
jwt.expiration=86400000

# No sembrar datos de prueba (tests corren sin los 300+ registros del DataSeeder)
skillmatch.seed.enabled=false

# ─── Logging silencioso en tests ──────────────────────────
logging.level.com.skillmatch.backend=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
